packages:
  - apps/*
  - packages/*
allowBuilds:
  "@parcel/watcher": true
  "@sentry/cli": true
  core-js: true
  esbuild: true
  msgpackr-extract: true
  protobufjs: true
  sharp: true
  workerd: true
# OpenTUI 0.4.0 (and its per-platform native binaries) is newer than the
# release-age delay allows. Deliberate bypass; remove once the release ages.
minimumReleaseAgeExclude:
  - "@opentui/core-darwin-arm64@0.4.0"
  - "@opentui/core-darwin-x64@0.4.0"
  - "@opentui/core-linux-arm64-musl@0.4.0"
  - "@opentui/core-linux-arm64@0.4.0"
  - "@opentui/core-linux-x64-musl@0.4.0"
  - "@opentui/core-linux-x64@0.4.0"
  - "@opentui/core-win32-arm64@0.4.0"
  - "@opentui/core-win32-x64@0.4.0"
  - "@opentui/core@0.4.0"
  - "@opentui/solid@0.4.0"
publicHoistPattern:
  - oxlint
  - oxfmt
