packages:
  - apps/*
  - packages/*
allowBuilds:
  "@google/genai": true
  "@parcel/watcher": true
  "@sentry/cli": true
  core-js: true
  esbuild: true
  msgpackr-extract: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
  workerd: true
minimumReleaseAgeExclude:
  - "@turbo/darwin-64@2.10.2"
  - "@turbo/darwin-arm64@2.10.2"
  - "@turbo/linux-64@2.10.2"
  - "@turbo/linux-arm64@2.10.2"
  - "@turbo/windows-64@2.10.2"
  - "@turbo/windows-arm64@2.10.2"
  - turbo@2.10.2
  - vite@8.1.2
publicHoistPattern:
  - oxlint
  - oxfmt
